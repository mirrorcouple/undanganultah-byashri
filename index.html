<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Party Khalid</title>

<style>

html{scroll-behavior:smooth}

body{
margin:0;
font-family:Poppins, sans-serif;
color:white;
background:linear-gradient(#020617,#0f172a,#1e3a8a);
overflow-x:hidden;
}

/* BINTANG */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:.7;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* FOTO SAMPING */

.side{
position:fixed;
top:50%;
width:140px;
transform:translateY(-50%);
z-index:2;
animation:floatSide 5s ease-in-out infinite;
}

.left{left:10px}
.right{right:10px}

@keyframes floatSide{
0%{transform:translateY(-50%) rotate(-5deg)}
50%{transform:translateY(-50%) rotate(5deg)}
100%{transform:translateY(-50%) rotate(-5deg)}
}

/* SECTION */

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* CARD */

.card{
background:rgba(15,23,42,.9);
padding:40px;
border-radius:20px;
max-width:520px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
border:1px solid rgba(255,255,255,.1);
}

/* KADO */

.gift{
width:170px;
height:170px;
cursor:pointer;
position:relative;
animation:shake 2s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(4deg)}
50%{transform:rotate(-4deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0)}
}

.box{
background:#2563eb;
width:170px;
height:120px;
position:absolute;
bottom:0;
border-radius:10px;
}

.lid{
background:#1d4ed8;
width:170px;
height:50px;
position:absolute;
top:0;
border-radius:10px;
transition:.8s;
transform-origin:left;
}

.open .lid{
transform:rotate(-120deg);
}

.ribbonV{
background:#facc15;
width:24px;
height:170px;
position:absolute;
left:73px;
}

.ribbonH{
background:#facc15;
height:24px;
width:170px;
position:absolute;
top:48px;
}

/* FOTO ANAK */

.mainPhoto{
width:180px;
border-radius:20px;
opacity:0;
transform:scale(.5);
transition:1s;
margin-bottom:20px;
}

.mainPhoto.show{
opacity:1;
transform:scale(1);
}

/* KUE */

.cake{
font-size:90px;
cursor:pointer;
opacity:0;
transform:scale(.5);
transition:1s;
}

.cake.show{
opacity:1;
transform:scale(1);
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(720deg)}
}

/* FIREWORK */

.firework{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:explode 1s forwards;
}

@keyframes explode{
to{transform:scale(15);opacity:0}
}

.countdown{
font-size:28px;
font-weight:bold;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="musik.mp3">
</audio>

<script>
for(let i=0;i<80;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDuration=Math.random()*3+1+"s"
document.body.appendChild(s)
}
</script>

<img src="foto-kiri.png" class="side left">
<img src="foto-kanan.png" class="side right">

<!-- COVER -->

<div class="section show">

<h1>🎉 Undangan Spesial 🎉</h1>
<p>Klik kadonya dulu ya 😆</p>

<div class="gift" onclick="openGift()">

<div class="lid"></div>
<div class="box"></div>
<div class="ribbonV"></div>
<div class="ribbonH"></div>

</div>

</div>

<!-- ACARA -->

<div class="section">

<div class="card">

<img src="foto-utama.png" class="mainPhoto" id="foto">

<div class="cake" id="cake" onclick="blow()">🎂</div>

<h1>Birthday Party</h1>
<h2>M. Khalid Al Husain</h2>

<p>📅 22 Maret 2026</p>
<p>🍽 Waktu: Makan Siang</p>
<p>🏠 Tempat: Rumah D'Is</p>

<p>Klik kue untuk meniup lilin 🎂</p>

</div>

</div>

<!-- COUNTDOWN -->

<div class="section">

<h1>⏳ Countdown Acara</h1>

<div id="countdown" class="countdown"></div>

</div>

<!-- LOKASI -->

<div class="section">

<div class="card">

<h1>📍 Lokasi Acara</h1>

<p>
Rumah D'Is<br>
Klik tombol untuk membuka navigasi
</p>

<button onclick="maps()">Buka Google Maps</button>

</div>

</div>

<!-- PENUTUP -->

<div class="section">

<div class="card">

<h1>🙏 Terimakasih</h1>
<p>Ditunggu kehadirannya</p>

</div>

</div>

<script>

let gift=false
let candle=false

window.addEventListener("scroll",()=>{

if(!gift){
window.scrollTo(0,0)
}

else if(gift && !candle){
if(window.scrollY>window.innerHeight){
window.scrollTo({top:window.innerHeight})
}
}

})

function openGift(){

gift=true

document.querySelector(".gift").classList.add("open")

confetti()

setTimeout(()=>{

document.getElementById("cake").classList.add("show")
document.getElementById("foto").classList.add("show")

window.scrollTo({
top:window.innerHeight,
behavior:"smooth"
})

},800)

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background="hsl("+Math.random()*360+"deg,70%,60%)"
c.style.animationDuration=Math.random()*3+2+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),5000)

}

}

function firework(){

for(let i=0;i<25;i++){

let f=document.createElement("div")
f.className="firework"

f.style.left=Math.random()*100+"vw"
f.style.top=Math.random()*60+"vh"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1000)

}

}

function blow(){

if(!candle){

candle=true

firework()

setTimeout(()=>{

window.scrollTo({
top:window.innerHeight*2,
behavior:"smooth"
})

},1000)

}

}

let eventDate=new Date("March 22, 2026 12:00:00").getTime()

setInterval(()=>{

let now=new Date().getTime()

let distance=eventDate-now

let d=Math.floor(distance/(1000*60*60*24))
let h=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let m=Math.floor((distance%(1000*60*60))/(1000*60))
let s=Math.floor((distance%(1000*60))/1000)

document.getElementById("countdown").innerHTML=
d+" Hari "+h+" Jam "+m+" Menit "+s+" Detik"

},1000)

function maps(){
window.open("https://maps.app.goo.gl/jq9JwTDr4s7uSShy8")
}

</script>

</body>
</html>
